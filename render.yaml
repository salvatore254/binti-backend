services:
  - type: web
    name: binti-events-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: PESAPAL_API_URL
        value: https://sandbox.pesapal.com
      - key: USE_PESAPAL_MOCK
        value: "false"
      - key: FRONTEND_URL
        value: https://bintievents.vercel.app
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: PESAPAL_CONSUMER_KEY
        value: ${PESAPAL_CONSUMER_KEY}
      - key: PESAPAL_CONSUMER_SECRET
        value: ${PESAPAL_CONSUMER_SECRET}
      - key: PESAPAL_CALLBACK_URL
        value: ${PESAPAL_CALLBACK_URL}
      - key: MPESA_CONSUMER_KEY
        value: ${MPESA_CONSUMER_KEY}
      - key: MPESA_CONSUMER_SECRET
        value: ${MPESA_CONSUMER_SECRET}
      - key: MPESA_CALLBACK_URL
        value: ${MPESA_CALLBACK_URL}
      - key: MPESA_PASSKEY
        value: ${MPESA_PASSKEY}
      - key: EMAIL_USER
        value: ${EMAIL_USER}
      - key: EMAIL_PASSWORD
        value: ${EMAIL_PASSWORD}
      - key: BACKEND_URL
        value: ${BACKEND_URL}
